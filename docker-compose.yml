services:

  # PHP
  php:
    build:
      context: ./php
    container_name: app_php
    volumes:
      - ./php/public:/var/www/html/public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    restart: unless-stopped

  # Web Server
  webserver:
    image: nginx:latest
    container_name: app_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./php/public:/var/www/html/public
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - app_network
    restart: unless-stopped

  # Database
  db:
    image: mariadb:latest
    container_name: app_db
    ports:
      - "3306:3306"
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: docker
      MARIADB_USER: developer
      MARIADB_PASSWORD: secret
    networks:
      - app_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: app_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: developer
      PMA_PASSWORD: secret
    depends_on:
      - db
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mariadb_data: