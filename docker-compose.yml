services:

  # server
  webserver:
    image: nginx:latest
    container_name: app_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf 
      # - .:/var/www
      # - .:/nginx/sites:/etc/nginx/conf.d

  # php
  php:
    image: php:8.4-fpm
    container_name: app_php
    volumes:
      - ./php/public/:/var/www/html/public